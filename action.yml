name: Symbol Audit
description: Scan code for multi-word symbols, classify with AI team alignment, create tracking issue.

inputs:
  target:
    description: 'What to scan: repo, pr, commit:<sha>, branch:<name>, range:<sha1>...<sha2>'
    required: false
    default: 'repo'
  namespace:
    description: Shared module namespace
    required: false
    default: 'symbol-audit'
  gemini-api-key:
    description: Gemini API key
    required: true
  anthropic-api-key:
    description: Anthropic API key
    required: true
  org:
    description: GitHub org for membership verification
    required: true
  actor:
    description: GitHub actor for membership verification
    required: true
  token:
    description: GitHub token (needed for private repos when fetching prior issues)
    required: false
    default: ${{ github.token }}
  audit-author:
    description: GitHub login that creates audit issues (filters prior issues to prevent prompt injection)
    required: false
    default: 'github-actions[bot]'
  as-is-gemini:
    description: Allow Gemini to mark symbols as-is
    required: false
    default: 'false'
  as-is-claude:
    description: Allow Claude to mark symbols as-is
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    # ── Stage 0: Setup ──────────────────────────────────────────────────────
    - name: Setup octoscript
      uses: sw2m/octoscript/action@main

    # ── Stage 1: Scan ──────────────────────────────────────────────────────
    - name: Scan for multi-word symbols
      shell: octoscript {0}
      env:
        INPUT_TARGET: ${{ env.INPUT_TARGET || inputs.target }}
        INPUT_NAMESPACE: ${{ env.INPUT_NAMESPACE || inputs.namespace }}
      run: |
        const { scan } = await import("${{ github.action_path }}/lib/scanner.ts");
        const target = inputs.get("target") || "repo";
        const ns = inputs.get("namespace");
        const results = await scan({ root: ".", target });
        await shared.set(ns, "backlog", JSON.stringify(results));
        console.log("Scanned " + results.length + " multi-word symbols");

    # ── Fetch prior issues for context ─────────────────────────────────────
    - name: Fetch last 7 completed audit issues
      shell: octoscript {0}
      env:
        INPUT_NAMESPACE: ${{ env.INPUT_NAMESPACE || inputs.namespace }}
        INPUT_AUDIT_AUTHOR: ${{ env.INPUT_AUDIT_AUTHOR || inputs.audit-author }}
        INPUT_TOKEN: ${{ env.INPUT_TOKEN || inputs.token }}
      run: |
        const ns = inputs.get("namespace");
        const author = inputs.get("audit-author") || "github-actions[bot]";
        const { owner, repo } = context.repo;
        const { data: issues } = await github.rest.issues.listForRepo({
          owner, repo, state: "closed", creator: author, per_page: 20,
          labels: "symbol-audit",
        });
        const completed = issues
          .filter((i) => i.state_reason === "completed")
          .slice(0, 7)
          .map((i) => ({ number: i.number, title: i.title, body: i.body }));
        await shared.set(ns, "context-issues", JSON.stringify(completed));
        console.log("Found " + completed.length + " prior audit issues for context");

    # ── Stage 2: External classification ───────────────────────────────────
    - name: Classify external symbols
      uses: sw2m/ci-agents/team@main
      with:
        namespace: ${{ inputs.namespace }}
        agents: '[{"agent":"gemini"},{"agent":"claude"}]'
        prompt: ${{ github.action_path }}/prompts/external.mustache
        schema: ${{ github.action_path }}/schemas/external.json
        evaluator: ${{ github.action_path }}/lib/evaluator.ts
        gemini-api-key: ${{ inputs.gemini-api-key }}
        anthropic-api-key: ${{ inputs.anthropic-api-key }}
        org: ${{ inputs.org }}
        actor: ${{ inputs.actor }}
        readonly: "true"

    # ── Merge external results ─────────────────────────────────────────────
    - name: Merge external classifications
      shell: octoscript {0}
      env:
        INPUT_NAMESPACE: ${{ env.INPUT_NAMESPACE || inputs.namespace }}
      run: |
        const ns = inputs.get("namespace");
        const backlog = JSON.parse(await shared.get(ns, "backlog") || "[]");
        const alignmentJson = await shared.get(ns, "alignment");
        if (!alignmentJson) { console.log("No external classification results"); exit(0); }
        const alignment = JSON.parse(alignmentJson);
        const extSymbols = new Set();
        for (const sym of (alignment.symbols || [])) {
          if (sym.label === "external") extSymbols.add(sym.symbol);
        }
        const updated = backlog.map((s) => extSymbols.has(s.symbol) ? { ...s, label: "external" } : s);
        await shared.set(ns, "backlog", JSON.stringify(updated));
        console.log("Marked " + extSymbols.size + " symbols as external");

    # ── Stage 3: Label classification ──────────────────────────────────────
    - name: Classify symbol labels
      uses: sw2m/ci-agents/team@main
      with:
        namespace: ${{ inputs.namespace }}
        agents: '[{"agent":"gemini"},{"agent":"claude"}]'
        prompt: ${{ github.action_path }}/prompts/categorize.mustache
        schema: ${{ github.action_path }}/schemas/categorize.json
        evaluator: ${{ github.action_path }}/lib/evaluator.ts
        gemini-api-key: ${{ inputs.gemini-api-key }}
        anthropic-api-key: ${{ inputs.anthropic-api-key }}
        org: ${{ inputs.org }}
        actor: ${{ inputs.actor }}
        readonly: "true"

    # ── Stage 4: Post-process and report ───────────────────────────────────
    - name: Post-process and create issue
      shell: octoscript {0}
      env:
        INPUT_NAMESPACE: ${{ env.INPUT_NAMESPACE || inputs.namespace }}
        INPUT_AS_IS_GEMINI: ${{ env.INPUT_AS_IS_GEMINI || inputs.as-is-gemini }}
        INPUT_AS_IS_CLAUDE: ${{ env.INPUT_AS_IS_CLAUDE || inputs.as-is-claude }}
      run: |
        const { evaluate, postProcess } = await import("${{ github.action_path }}/lib/evaluator.ts");

        const ns = inputs.get("namespace");
        const backlog = JSON.parse(await shared.get(ns, "backlog") || "[]");
        const outputsJson = await shared.get(ns, "outputs");
        const outputs = outputsJson ? JSON.parse(outputsJson) : [];

        const geminiResults = outputs.find((o) => o.agent === "gemini")?.output?.symbols || [];
        const claudeResults = outputs.find((o) => o.agent === "claude")?.output?.symbols || [];
        const asIsGemini = inputs.get("as-is-gemini") === "true";
        const asIsClaude = inputs.get("as-is-claude") === "true";

        const unlabelled = backlog.filter((s) => !s.label);
        const evalResult = evaluate(unlabelled, geminiResults, claudeResults, { gemini: asIsGemini, claude: asIsClaude });
        const final = postProcess(evalResult.symbols);

        const externals = backlog.filter((s) => s.label === "external");
        const all = [...externals, ...final];

        const labelCounts = {};
        for (const s of all) labelCounts[s.label] = (labelCounts[s.label] || 0) + 1;

        let body = "## Symbol Audit Report\n\n";
        body += "**Total symbols**: " + all.length + "\n";
        body += "**Aligned**: " + evalResult.aligned + " | **Misaligned**: " + evalResult.misaligned + "\n\n";

        body += "### Summary\n\n| Label | Count |\n|---|---|\n";
        for (const [label, count] of Object.entries(labelCounts).sort((a, b) => b[1] - a[1])) {
          body += "| `" + label + "` | " + count + " |\n";
        }

        body += "\n### Symbols\n\n| Symbol | Label | Kind | File | Line |\n|---|---|---|---|---|\n";
        for (const s of all.sort((a, b) => a.label.localeCompare(b.label) || a.symbol.localeCompare(b.symbol))) {
          body += "| `" + s.symbol + "` | `" + s.label + "` | " + s.kind + " | " + s.file + " | " + s.line + " |\n";
        }

        if (evalResult.asIsAttempts.length > 0) {
          body += "\n### As-Is Audit\n\n";
          body += "The following symbols were marked as `as-is` by an agent not authorized to do so.\n\n";
          body += "| Symbol | Agent |\n|---|---|\n";
          for (const a of evalResult.asIsAttempts) {
            body += "| `" + a.symbol + "` | " + a.agent + " |\n";
          }
        }

        await github.rest.issues.create({
          ...context.repo,
          title: "Symbol Audit — " + new Date().toISOString().slice(0, 10),
          body,
          labels: ["symbol-audit"],
        });
        console.log("Created symbol audit issue");
